<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript variable</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <pre id="out"></pre>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">
        Run
    </button>
    <script>
        const out = document.getElementById("out");
        function print(...args) {
            //Console
            console.log(...args);
            out.textContent += args.join("") + "\n";
        }

        function clearOut() {
            out.textContent = "";
        }
        
        function run() {
            clearOut();
            //var
            var a = 10;
            var a = 20;
            print("value of var a=", a);

            //let
            let b = 5;
            b = 15;
            // let b=25; // creates error if uncommented becoze it Cannot redeclare block-scoped variable 'b' again.
            print("value of let b=", b);

            //Const
            const pi = 3.1415;
            pi = 2.13;
            print("const value of pi=", pi);
        }
        document.getElementById("runBtn").addEventListener("click", run);
    </script>
</body>

</html>
