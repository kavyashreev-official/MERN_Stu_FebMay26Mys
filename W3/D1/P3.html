<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS variable: Hoisting</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <pre id="out"></pre>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">
        Run
    </button>
    <script>
        const out = document.getElementById("out");
        function print(...args) {
            //Console
            console.log(...args);
            out.textContent += args.join("") + "\n";
        }

        function clearOut() {
            out.textContent = "";
        }
        
        function run() {
            clearOut();
            //var: scope
            if(true){
                var x="var escapes the if block";
            }
            print("x=",x);

            //let: scope
            if(true){
                let y="let stays in the if block"
                print("y inside block=",y);
            }

            var testVar="assigned value now";
            print("After declaration=",testVar);      
            try{
                print("Before let declaration",testLet);
            }  
            catch(e){
                printf("Accessing let before decn. causes", e.name,e.message);
            }
            let testLet="declared now";
            print("After let decln.",testLet);
        }
        
        document.getElementById("runBtn").addEventListener("click", run);
    </script>
</body>

</html>
